set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-kitty:Tc"
set-window-option -g mode-keys vi
set -g mouse on

# Seamless navigation between tmux panes and nvim splits
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'

if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -n 'C-Space' if-shell "$is_vim" 'send-keys C-Space' 'select-pane -t:.+'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
bind-key -T copy-mode-vi 'C-Space' select-pane -t:.+

# Enter copy mode with Alt+m
bind-key -n M-m copy-mode -e

# Alt+j/k to scroll one line (matching opencode behavior)
bind-key -T copy-mode-vi M-k send-keys -X scroll-up
bind-key -T copy-mode-vi M-j send-keys -X scroll-down

# Alt+u/d for half page scrolling (matching opencode)
bind-key -T copy-mode-vi M-u send-keys -X halfpage-up
bind-key -T copy-mode-vi M-d send-keys -X halfpage-down

# Vim-like visual selection and yank in copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# Active pane border styling
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=green,bold

# Pane management
bind-key -n M-L split-window -h -c "#{pane_current_path}"
bind-key -n M-K split-window -v -c "#{pane_current_path}"
bind-key -n M-Q kill-pane
bind-key -n M-D detach-client
